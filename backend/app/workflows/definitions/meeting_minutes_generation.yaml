name: meeting_minutes_generation
version: 2
description: 音声/テキスト入力から議事録を作成し、レビュー後にdocx出力する
inputs:
  - input_type
  - audio_path
  - transcript_text
context:
  format_name: company_default_minutes_format
  candidate_count: 3

start_at: ingest_text
steps:
  - id: ingest_text
    name: use_input_transcript
    type: pass_through
    skill: transcript-loader
    description: テキスト入力時は文字起こし済みテキストを利用
    condition: "input_type == 'text'"
    input:
      transcript: $.transcript_text
    output:
      transcript: $.transcript
    next: transcribe_audio

  - id: transcribe_audio
    name: transcribe_audio
    type: transcribe
    skill: whisper-runner
    description: 音声入力時のみWhisperで文字起こし
    condition: "input_type == 'audio'"
    input:
      audio_path: $.audio_path
    output:
      transcript: $.transcript
    next: generate_minutes_drafts

  - id: generate_minutes_drafts
    name: generate_minutes_drafts
    type: generate_draft
    skill: minutes-generator
    description: transcript から議事録候補を複数生成
    condition: transcript_exists
    num_candidates: 3
    input:
      transcript: $.transcript
      format: $.context.format_name
    output:
      candidates: $.draft_candidates
    next: human_review

  - id: human_review
    name: human_review
    type: human_review
    skill: reviewer
    description: 人手レビューで修正指示 or 完成指示
    human_review:
      pause: true
      allowed_actions:
        - revise
        - approve
      revise_loop:
        step: revise_draft
        return_to: human_review
    next: export_docx

  - id: revise_draft
    name: revise_draft
    type: revise
    skill: revision-runner
    description: 修正コメントを適用して再生成
    input:
      selected_candidate: $.review.selected_candidate
      feedback_text: $.review.feedback_text
    output:
      revised_candidate: $.draft_candidates[]
    next: human_review

  - id: export_docx
    name: export_docx
    type: export
    skill: docx-exporter
    description: 承認済み議事録をdocxで出力
    condition: "review.approved == true"
    input:
      final_minutes: $.final_minutes
    output:
      artifact_path: $.artifacts.docx

outputs:
  - final_minutes
  - artifacts.docx
