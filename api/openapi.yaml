openapi: 3.1.0
info:
  title: Order Lookup API
  version: 1.0.0
paths:
  /v1/orders/by-n-number/{n_number}:
    get:
      summary: Lookup order by N number
      parameters:
        - in: path
          name: n_number
          required: true
          schema:
            type: string
            pattern: '^N[0-9]{9}$'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderLookupResponse'
        '400':
          description: Invalid identifier
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Multiple matches
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/orders/{web_entry_id}:
    get:
      summary: Lookup order by web entry id
      parameters:
        - in: path
          name: web_entry_id
          required: true
          schema:
            type: string
            pattern: '^UN[0-9]{10}$'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderLookupResponse'
        '400':
          description: Invalid identifier
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    OrderLookupResponse:
      type: object
      required: [identifiers, order_status, construction]
      properties:
        identifiers:
          type: object
          required: [n_number, web_entry_id]
          properties:
            n_number:
              type: string
            web_entry_id:
              type: string
        order_status:
          type: object
          required: [status, last_updated]
          properties:
            status:
              type: string
              enum: [CONFIRMED]
            last_updated:
              type: string
              format: date-time
        construction:
          type: array
          items:
            type: object
            required: [construction_item_id, normalized_type, overview, scheduled]
            properties:
              construction_item_id:
                type: string
              normalized_type:
                type: string
              overview:
                type: string
              scheduled:
                type: object
                required: [date, time_slot]
                properties:
                  date:
                    type: string
                    pattern: '^\\d{4}-\\d{2}-\\d{2}$'
                  time_slot:
                    type: string
                    pattern: '^\\d{2}:\\d{2}～\\d{2}:\\d{2}$'
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, trace_id]
          properties:
            code:
              type: string
              enum: [INVALID_IDENTIFIER, NOT_FOUND, MULTIPLE_MATCHES, SERVICE_UNAVAILABLE]
            message:
              type: string
            trace_id:
              type: string
