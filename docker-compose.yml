services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_BACKEND_BASE_URL: ${VITE_BACKEND_BASE_URL:-http://localhost:8000}
      VITE_AUTH0_DOMAIN: ${VITE_AUTH0_DOMAIN:-your-tenant.us.auth0.com}
      VITE_AUTH0_CLIENT_ID: ${VITE_AUTH0_CLIENT_ID:-your-client-id}
      VITE_AUTH0_REDIRECT_URI: ${VITE_AUTH0_REDIRECT_URI:-http://localhost:5173}
    depends_on:
      - backend

  api:
    build:
      context: ./api
    ports:
      - "8001:8001"

  mcp-order-lookup:
    build:
      context: ./mcp_order_lookup_server
    ports:
      - "9000:9000"
    environment:
      ORDER_LOOKUP_API_BASE_URL: http://api:8001
      ORDER_LOOKUP_API_TIMEOUT_SECONDS: "5"
      MCP_TRANSPORT: streamable-http
      MCP_HOST: 0.0.0.0
      MCP_PORT: "9000"
    depends_on:
      - api

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      SYSTEM_API_BASE_URL: http://api:8001
      ORDER_LOOKUP_MCP_BASE_URL: http://mcp-order-lookup:9000/mcp
      HTTP_TIMEOUT_SECONDS: "5"
      GEMINI_API_BASE_URL: https://generativelanguage.googleapis.com/v1beta
      GEMINI_API_KEY: "your-api-key"
      GEMINI_MODEL: gemini-2.5-flash
      GEMINI_TIMEOUT_SECONDS: "60"
    depends_on:
      - api
      - mcp-order-lookup
