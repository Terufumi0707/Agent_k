services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    working_dir: /app
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      PROJECT_ROOT: /app
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      GEMINI_MODEL_CANDIDATES: ${GEMINI_MODEL_CANDIDATES:-gemini-2.0-flash,gemini-2.5-flash,gemini-1.5-flash}
      GEMINI_TIMEOUT_SECONDS: ${GEMINI_TIMEOUT_SECONDS:-20}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./artifacts:/app/artifacts

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    working_dir: /app
    command: npm run dev -- --host 0.0.0.0 --port 5173
    environment:
      VITE_API_BASE_PATH: /api
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
